syntax = "proto3";

package api.v1.instance;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/ctfer-io/chall-manager/api/v1/instance;instance";

// The InstanceManager handles the charge of spinning up challenge
// instances (require it to be stored in the ChallengeStore).
// Through this manager, the instance implements all CRUD operations necessary
// to handle a lifecycle.
service InstanceManager {
  // Spins up a challenge instance, iif the challenge is registered
  // and no instance is yet running.
  rpc CreateInstance(CreateInstanceRequest) returns (Instance) {
    option (google.api.http) = {
      post: "/api/v1/instance"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a challenge instance"
      description: "Instantiates a challenge for a given source ID. The challenge must exist and must not be expired."
      responses: {
        key: "400"
        value: {
          description: "Invalid request arguments."
          examples: {
            key: "application/json"
            value: '{"code":9,"message":"Challenge has expired.","details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo","reason":"CHALLENGE_EXPIRED","domain":"github.com/ctfer-io/chall-manager","metadata":{"id":"1"}},{"@type":"type.googleapis.com/google.rpc.PreconditionFailure","violations":[{"type":"EXPIRATION","subject":"github.com/ctfer-io/chall-manager/Challenge","description":"Challenge has expired so can no longer process instance requests."}]}]}'
          }
        }
      }
      responses: {
        key: "404"
        value: {
          description: "The referenced challenge does not exist."
          examples: {
            key: "application/json"
            value: '{"code":5, "message":"Challenge not found.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"CHALLENGE_NOT_FOUND", "domain":"github.com/ctfer-io/chall-manager", "metadata":{"id":"1"}}, {"@type":"type.googleapis.com/google.rpc.ResourceInfo", "resourceType":"Challenge", "resourceName":"1", "owner":"", "description":"No challenge with this ID was found."}]}'
          }
        }
      }
      responses: {
        key: "409"
        value: {
          description: "An instance already exists for this source ID."
          examples: {
            key: "application/json"
            value: '{"code":6, "message":"Instance already exists.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INSTANCE_ALREADY_EXISTS", "domain":"github.com/ctfer-io/chall-manager", "metadata":{"challenge_id":"1", "source_id":"1"}}, {"@type":"type.googleapis.com/google.rpc.ResourceInfo", "resourceType":"Instance", "resourceName":"1/1", "owner":"", "description":"An instance with this ID already exists."}]}'
          }
        }
      }
      responses: {
        key: "500"
        value: {
          description: "Internal server error. No internal details are exposed."
          examples: {
            key: "application/json"
            value: '{"code":13, "message":"An internal error occurred.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INTERNAL_ERROR", "domain":"github.com/ctfer-io/chall-manager", "metadata":{}}]}'
          }
        }
      }
    };
  }

  // Once created, you can retrieve the instance information.
  // If it has not been created yet, returns an error.
  rpc RetrieveInstance(RetrieveInstanceRequest) returns (Instance) {
    option (google.api.http) = {get: "/api/v1/instance/{challenge_id}/{source_id}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Retrieve an instance"
      description: "Retrieve an instance given the challenge and source IDs. The challenge must exist and must not be expired."
      responses: {
        key: "400"
        value: {
          description: "Invalid request arguments."
        }
      }
      responses: {
        key: "404"
        value: {
          description: "The referenced instance does not exist."
          examples: {
            key: "application/json"
            value: '{"code":5, "message":"Instance not found.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INSTANCE_NOT_FOUND", "domain":"github.com/ctfer-io/chall-manager", "metadata":{"challenge_id":"1", "source_id":"1"}}, {"@type":"type.googleapis.com/google.rpc.ResourceInfo", "resourceType":"Instance", "resourceName":"1/1", "owner":"", "description":"No instance with this ID was found."}]}'
          }
        }
      }
      responses: {
        key: "500"
        value: {
          description: "Internal server error. No internal details are exposed."
          examples: {
            key: "application/json"
            value: '{"code":13, "message":"An internal error occurred.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INTERNAL_ERROR", "domain":"github.com/ctfer-io/chall-manager", "metadata":{}}]}'
          }
        }
      }
    };
  }

  // Query all instances that matches the request parameters.
  // Especially usefull to query all the instances of a source_id.
  rpc QueryInstance(QueryInstanceRequest) returns (stream Instance) {
    option (google.api.http) = {get: "/api/v1/instance"};
  }

  // Once an instance is spinned up, it will have a lifetime.
  // Passed it, it will exprie i.e. will be deleted as soon as possible
  // by the chall-manager-janitor.
  // To increase this lifetime, a player can ask to renew it. This will
  // set the until date to the request time more the challenge timeout.
  rpc RenewInstance(RenewInstanceRequest) returns (Instance) {
    option (google.api.http) = {
      patch: "/api/v1/instance/{challenge_id}/{source_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Retrieve an instance"
      description: "Retrieve an instance given the challenge and source IDs. The challenge must exist and must not be expired."
      responses: {
        key: "400"
        value: {
          description: "Invalid request arguments."
          examples: {
            key: "application/json"
            value: '{"code":9, "message":"Challenge does not accept renewal.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"CHALLENGE_NO_RENEWAL", "domain":"github.com/ctfer-io/chall-manager", "metadata":{"id":"1"}}, {"@type":"type.googleapis.com/google.rpc.PreconditionFailure", "violations":[{"type":"RENEWAL", "subject":"github.com/ctfer-io/chall-manager/Challenge", "description":"Challenge has no timeout thus cannot be renewed."}]}]}'
          }
          examples: {
            key: "application/json"
            value: '{"code":9, "message":"Instance can''t be renewed as it expired.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INSTANCE_EXPIRED", "domain":"github.com/ctfer-io/chall-manager", "metadata":{"challenge_id":"1", "source_id":"1"}}, {"@type":"type.googleapis.com/google.rpc.PreconditionFailure", "violations":[{"type":"EXPIRATION", "subject":"github.com/ctfer-io/chall-manager/Instance", "description":"Instance has expired so can no longer process renewal request."}]}]}'
          }
        }
      }
      responses: {
        key: "404"
        value: {
          description: "The referenced instance does not exist."
          examples: {
            key: "application/json"
            value: '{"code":5, "message":"Instance not found.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INSTANCE_NOT_FOUND", "domain":"github.com/ctfer-io/chall-manager", "metadata":{"challenge_id":"1", "source_id":"1"}}, {"@type":"type.googleapis.com/google.rpc.ResourceInfo", "resourceType":"Instance", "resourceName":"1/1", "owner":"", "description":"No instance with this ID was found."}]}'
          }
        }
      }
      responses: {
        key: "500"
        value: {
          description: "Internal server error. No internal details are exposed."
          examples: {
            key: "application/json"
            value: '{"code":13, "message":"An internal error occurred.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INTERNAL_ERROR", "domain":"github.com/ctfer-io/chall-manager", "metadata":{}}]}'
          }
        }
      }
    };
  }

  // After completion, the challenge instance is no longer required.
  // This spins down the instance and removes if from filesystem.
  rpc DeleteInstance(DeleteInstanceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/instance/{challenge_id}/{source_id}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Retrieve an instance"
      description: "Retrieve an instance given the challenge and source IDs. The challenge must exist and must not be expired."
      responses: {
        key: "404"
        value: {
          description: "The referenced instance does not exist."
          examples: {
            key: "application/json"
            value: '{"code":5, "message":"Instance not found.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INSTANCE_NOT_FOUND", "domain":"github.com/ctfer-io/chall-manager", "metadata":{"challenge_id":"1", "source_id":"1"}}, {"@type":"type.googleapis.com/google.rpc.ResourceInfo", "resourceType":"Instance", "resourceName":"1/1", "owner":"", "description":"No instance with this ID was found."}]}'
          }
        }
      }
      responses: {
        key: "500"
        value: {
          description: "Internal server error. No internal details are exposed."
          examples: {
            key: "application/json"
            value: '{"code":13, "message":"An internal error occurred.", "details":[{"@type":"type.googleapis.com/google.rpc.ErrorInfo", "reason":"INTERNAL_ERROR", "domain":"github.com/ctfer-io/chall-manager", "metadata":{}}]}'
          }
        }
      }
    };
  }
}

message CreateInstanceRequest {
  // The challenge identifier
  string challenge_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The source (user/team) identifier.
  string source_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // A key=value additional configuration to pass to the instance when created.
  map<string, string> additional = 3 [(google.api.field_behavior) = OPTIONAL];
}

message RetrieveInstanceRequest {
  // The challenge identifier
  string challenge_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The source (user/team) identifier.
  string source_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];
}

message QueryInstanceRequest {
  // The source (user/team) identifier.
  string source_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];
}

message RenewInstanceRequest {
  // The challenge identifier
  string challenge_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The source (user/team) identifier.
  string source_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];
}

message DeleteInstanceRequest {
  // The challenge identifier
  string challenge_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The source (user/team) identifier.
  string source_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];
}

// The challenge instance object that the chall-manager exposes.
// Notice it differs from the internal representation, as it handles
// filesystem-related information.
message Instance {
  // The challenge identifier
  string challenge_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The source (user/team) identifier.
  string source_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The time since when the instance is running.
  google.protobuf.Timestamp since = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The last time the instance has been renewed.
  google.protobuf.Timestamp last_renew = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // The time the instance will "die" i.e. be destroyed by the janitor.
  optional google.protobuf.Timestamp until = 5 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = OPTIONAL
  ];

  // The connection information that is given to the players in order
  // to reach their instance.
  string connection_info = 6 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = REQUIRED
  ];

  // If specified, the flag that validates the challenge instance.
  // This avoids shareflag, but don't block sharing solving strategy/write-up.
  // DEPRECATED: #950 showed the need for multiple flags, so please migrate to it.
  optional string flag = 7 [
    deprecated = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {example: "1"},
    (google.api.field_behavior) = OPTIONAL
  ];

  // A list of flags that validates the challenge instance.
  // This avoids shareflag, but don't block sharing solving strategy/write-up.
  repeated string flags = 9 [(google.api.field_behavior) = OPTIONAL];

  // A key=value additional configuration to pass to the instance when created.
  map<string, string> additional = 8 [(google.api.field_behavior) = OPTIONAL];
}
